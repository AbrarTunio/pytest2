<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Quiz – CodePro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161b24;
    --border: #2a3347;
    --card: #1e2535;
    --accent: #4ade80;
    --accent2: #38bdf8;
    --warn: #fb923c;
    --err: #f87171;
    --text: #e2e8f0;
    --muted: #7c8fa6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 5rem;
  }
  header {
    width: 100%; max-width: 740px;
    display: flex; align-items: center; gap: .75rem;
    margin-bottom: 2rem;
  }
  .logo {
    width: 34px; height: 34px; background: var(--accent); border-radius: 8px;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: .82rem; color: #0d0f14;
  }
  header h1 { font-size: .95rem; font-weight: 600; color: var(--muted); letter-spacing: .05em; }
  header h1 span { color: var(--text); }

  .screen { width: 100%; max-width: 740px; display: none; animation: up .3s ease both; }
  .screen.active { display: block; }
  @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  /* ── LANDING ── */
  #screen-landing {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 1.4rem; padding: 3rem 2rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  }
  .big-emoji { font-size: 3.5rem; }
  #screen-landing h2 { font-size: 1.9rem; font-weight: 800; }
  #screen-landing h2 span { color: var(--accent); }
  #screen-landing p { color: var(--muted); max-width: 420px; line-height: 1.75; font-size: .95rem; }
  .badges { display: flex; gap: .45rem; flex-wrap: wrap; justify-content: center; }
  .badge {
    padding: .28rem .7rem; border-radius: 99px; font-size: .7rem; font-weight: 700; letter-spacing: .04em;
    background: rgba(74,222,128,.1); color: var(--accent); border: 1px solid rgba(74,222,128,.2);
  }
  .badge.b { background: rgba(56,189,248,.1); color: var(--accent2); border-color: rgba(56,189,248,.2); }
  .badge.o { background: rgba(251,146,60,.1); color: var(--warn); border-color: rgba(251,146,60,.2); }

  #name-input {
    width: 100%; max-width: 320px;
    padding: .8rem 1.1rem; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--card);
    color: var(--text); font-family: 'Sora', sans-serif; font-size: 1rem;
    outline: none; transition: border-color .2s;
  }
  #name-input:focus { border-color: var(--accent); }
  #name-input::placeholder { color: var(--muted); }
  .name-err { color: var(--err); font-size: .8rem; display: none; }

  .btn {
    padding: .78rem 2rem; border-radius: 10px; border: none;
    font-family: 'Sora', sans-serif; font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: transform .12s, opacity .12s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0d0f14; }
  .btn-primary:hover { opacity: .88; }
  .btn-ghost { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }

  /* ── QUIZ ── */
  #quiz-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem;
  }
  .q-label-top { font-size: .8rem; color: var(--muted); }
  .q-label-top span { color: var(--text); font-weight: 700; }
  .prog-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .35s ease; }

  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.6rem; margin-bottom: 1.2rem;
  }
  .q-topic {
    font-size: .68rem; font-weight: 700; letter-spacing: .1em;
    color: var(--accent); text-transform: uppercase; margin-bottom: .65rem;
  }
  .q-title { font-size: .97rem; font-weight: 600; margin-bottom: 1.1rem; line-height: 1.6; }
  .code-block {
    font-family: 'JetBrains Mono', monospace; font-size: .86rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.2rem; line-height: 2.1; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word;
  }
  .kw  { color: #c084fc; font-weight: 700; }
  .str { color: #86efac; }
  .num { color: #fbbf24; }
  .cmt { color: #4b5563; font-style: italic; }

  .blank-input {
    display: inline-block; min-width: 88px;
    padding: .12rem .5rem; border-radius: 6px;
    border: 1.5px solid var(--accent2); background: rgba(56,189,248,.07);
    color: var(--accent2); font-family: 'JetBrains Mono', monospace;
    font-size: .86rem; outline: none;
    transition: border-color .2s, background .2s; vertical-align: middle;
  }
  .blank-input:focus { border-color: var(--accent); background: rgba(74,222,128,.07); color: var(--accent); }

  /* result state applied on blanks after submit */
  .blank-input.correct { border-color: var(--accent);  background: rgba(74,222,128,.13); color: var(--accent);  pointer-events: none; }
  .blank-input.wrong   { border-color: var(--err);     background: rgba(248,113,113,.1); color: var(--err);     pointer-events: none; }

  .nav-row { display: flex; justify-content: flex-end; gap: .75rem; margin-top: 1.2rem; }

  /* ── RESULT ── */
  #screen-result { text-align: center; }
  .res-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 2.5rem 1.75rem;
    display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
  }
  .res-emoji { font-size: 3.8rem; }
  .res-card h2 { font-size: 1.7rem; font-weight: 800; }
  .res-card h2 span { color: var(--accent); }
  .score-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3.8rem; font-weight: 700; color: var(--accent); line-height: 1;
  }
  .score-big sub { font-size: 1.3rem; color: var(--muted); font-weight: 400; }
  .res-msg { color: var(--muted); max-width: 360px; line-height: 1.7; font-size: .92rem; }

  .breakdown { width: 100%; text-align: left; margin-top: .25rem; }
  .breakdown h3 {
    font-size: .72rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem;
  }
  .bk-item {
    display: flex; align-items: flex-start; gap: .7rem;
    padding: .6rem 0; border-bottom: 1px solid var(--border);
    font-size: .82rem; line-height: 1.55;
  }
  .bk-item:last-child { border-bottom: none; }
  .bk-num  { color: var(--muted); min-width: 26px; font-family: 'JetBrains Mono', monospace; font-size: .78rem; }
  .bk-icon { min-width: 18px; }
  .bk-ok   { color: var(--accent); font-weight: 600; }
  .bk-wrong{ color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: .78rem; }
  .bk-right{ color: var(--accent2); font-family: 'JetBrains Mono', monospace; font-size: .78rem; }

  .res-actions { display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }

  @media(max-width:480px){
    .q-card { padding: 1.1rem; }
    .code-block { font-size: .76rem; }
    .blank-input { min-width: 60px; font-size: .76rem; }
    #screen-landing h2 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">&gt;_</div>
  <h1>CodePro <span>Python Quiz</span></h1>
</header>

<!-- LANDING -->
<div id="screen-landing" class="screen active">
  <div class="big-emoji">🐍</div>
  <h2>Python <span>Basics</span> Quiz</h2>
  <p>Fill in the blanks to complete each Python code snippet. You will see your score at the end.</p>
  <div class="badges">
    <span class="badge">📋 Lists</span>
    <span class="badge b">🔁 For Loops</span>
    <span class="badge o">🔀 If / Else</span>
  </div>
  <input id="name-input" type="text" placeholder="Enter your name to begin..." maxlength="40" autocomplete="off">
  <span class="name-err" id="name-err">⚠ Please enter your name first.</span>
  <button class="btn btn-primary" onclick="startQuiz()">▶ Start Quiz</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div id="quiz-bar">
    <span class="q-label-top">Question <span id="q-num">1</span> of <span id="q-tot">20</span></span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
  <div id="q-container"></div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="res-card">
    <div class="res-emoji" id="res-emoji">🎉</div>
    <h2>Done, <span id="res-name"></span>!</h2>
    <div class="score-big" id="res-score"></div>
    <p class="res-msg" id="res-msg"></p>
    <div class="res-actions">
      <button class="btn btn-primary" onclick="retryQuiz()">🔄 Try Again</button>
    </div>
    <div class="breakdown">
      <h3>📊 Answer Breakdown</h3>
      <div id="bk-list"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  QUESTIONS
// ─────────────────────────────────────────
const QUESTIONS = [
  {
    topic: "For Loop",
    title: "Which keyword is used to start a loop in Python?",
    template: `numbers = [1, 2, 3, 4, 5]
___ n in numbers:
    print(n)`,
    blanks: [{ ph: "keyword", size: 5 }],
    answers: ["for"]
  },
  {
    topic: "For Loop",
    title: "What keyword comes after the loop variable to specify the list?",
    template: `cities = ["Karachi", "Lahore", "Hyderabad"]
for city ___ cities:
    print(city)`,
    blanks: [{ ph: "keyword", size: 4 }],
    answers: ["in"]
  },
  {
    topic: "For Loop",
    title: "What function is used to display output inside a loop?",
    template: `names = ["Ali", "Sara", "Usman"]
for name in names:
    ___(name)`,
    blanks: [{ ph: "function", size: 7 }],
    answers: ["print"]
  },
  {
    topic: "For Loop",
    title: "Fill in the loop variable — it is used inside the loop to print each item.",
    template: `fruits = ["mango", "apple", "banana"]
for ___ in fruits:
    print(item)`,
    blanks: [{ ph: "variable", size: 6 }],
    answers: ["item"]
  },
  {
    topic: "If Statement",
    title: "Which keyword is used to check a condition in Python?",
    template: `age = 18
___ age >= 18:
    print("You can vote")`,
    blanks: [{ ph: "keyword", size: 4 }],
    answers: ["if"]
  },
  {
    topic: "If / Else",
    title: "Which keyword handles the case when the if condition is False?",
    template: `score = 40
if score >= 50:
    print("Pass")
___:
    print("Fail")`,
    blanks: [{ ph: "keyword", size: 6 }],
    answers: ["else"]
  },
  {
    topic: "If / Else",
    title: "Which operator checks if two values are EQUAL?",
    template: `color = "red"
if color ___ "red":
    print("Stop!")`,
    blanks: [{ ph: "operator", size: 4 }],
    answers: ["=="]
  },
  {
    topic: "If / Else",
    title: "Which operator checks if two values are NOT equal?",
    template: `x = 5
if x ___ 10:
    print("x is not 10")`,
    blanks: [{ ph: "operator", size: 4 }],
    answers: ["!="]
  },
  {
    topic: "Loop + If",
    title: "Fill in both blanks — the loop keyword and the condition keyword.",
    template: `marks = [45, 78, 33, 90, 55]
___ m in marks:
    ___ m >= 50:
        print("Pass")`,
    blanks: [
      { ph: "loop kw", size: 5 },
      { ph: "cond kw", size: 4 }
    ],
    answers: ["for", "if"]
  },
  {
    topic: "Loop + If/Else",
    title: "Fill in the loop keyword and the else keyword.",
    template: `numbers = [2, 7, 4, 9, 1]
___ n in numbers:
    if n > 5:
        print("Big")
    ___:
        print("Small")`,
    blanks: [
      { ph: "loop kw", size: 5 },
      { ph: "else kw", size: 6 }
    ],
    answers: ["for", "else"]
  },
  {
    topic: "List Index",
    title: "Python list index starts at ___. What index gives the FIRST item?",
    template: `animals = ["cat", "dog", "bird"]
print( animals[___] )
# prints: cat`,
    blanks: [{ ph: "index", size: 4 }],
    answers: ["0"]
  },
  {
    topic: "List Index",
    title: "What index gives the SECOND item in a list?",
    template: `colors = ["red", "green", "blue"]
print( colors[___] )
# prints: green`,
    blanks: [{ ph: "index", size: 4 }],
    answers: ["1"]
  },
  {
    topic: "List Slicing",
    title: "To print the first 3 items using slicing, what is the end index?",
    template: `items = ["a", "b", "c", "d", "e"]
print( items[0:___] )
# Output: ['a', 'b', 'c']`,
    blanks: [{ ph: "end", size: 4 }],
    answers: ["3"]
  },
  {
    topic: "append()",
    title: "Which method adds an item to the END of a list?",
    template: `fruits = ["mango", "apple"]
fruits.___("banana")
print(fruits)
# Output: ['mango', 'apple', 'banana']`,
    blanks: [{ ph: "method", size: 8 }],
    answers: ["append"]
  },
  {
    topic: "insert()",
    title: "Which method inserts an item at a SPECIFIC position in a list?",
    template: `fruits = ["mango", "apple"]
fruits.___(1, "banana")
print(fruits)
# Output: ['mango', 'banana', 'apple']`,
    blanks: [{ ph: "method", size: 8 }],
    answers: ["insert"]
  },
  {
    topic: "insert()",
    title: "To insert 'orange' at the very beginning, what position number do you use?",
    template: `fruits = ["mango", "apple"]
fruits.insert(___, "orange")
print(fruits)
# Output: ['orange', 'mango', 'apple']`,
    blanks: [{ ph: "position", size: 4 }],
    answers: ["0"]
  },
  {
    topic: "remove()",
    title: "Which method removes an item from a list by its VALUE?",
    template: `animals = ["cat", "dog", "bird"]
animals.___("dog")
print(animals)
# Output: ['cat', 'bird']`,
    blanks: [{ ph: "method", size: 8 }],
    answers: ["remove"]
  },
  {
    topic: "Loop + append()",
    title: "Which method adds each qualifying number into the 'big' list?",
    template: `numbers = [3, 8, 1, 9, 4, 7]
big = []
for n in numbers:
    if n > 5:
        big.___(n)
print(big)`,
    blanks: [{ ph: "method", size: 8 }],
    answers: ["append"]
  },
  {
    topic: "Comparison Operator",
    title: "Fill in the operator to check if a number is greater than or equal to 50.",
    template: `scores = [45, 80, 55, 30, 70]
for s in scores:
    if s ___ 50:
        print(s, "is a pass")`,
    blanks: [{ ph: "operator", size: 4 }],
    answers: [">="]
  },
  {
    topic: "Full Code",
    title: "Complete all three blanks to make this program work correctly.",
    template: `names = ["Ali", "Sara", "Ahmed", "Zara"]
___ name in names:
    ___ name == "Sara":
        print("Hello Sara!")
    ___:
        print("Hi", name)`,
    blanks: [
      { ph: "loop kw", size: 5 },
      { ph: "cond kw", size: 4 },
      { ph: "else kw", size: 6 }
    ],
    answers: ["for", "if", "else"]
  }
];

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let studentName = '';
let current = 0;
let userAnswers = []; // array of arrays, one per question

// ─────────────────────────────────────────
//  SCREENS
// ─────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-err').style.display = 'block'; return; }
  studentName = val;
  current = 0;
  userAnswers = QUESTIONS.map(q => q.blanks.map(() => ''));
  document.getElementById('q-tot').textContent = QUESTIONS.length;
  show('screen-quiz');
  renderQuestion();
}

function retryQuiz() {
  document.getElementById('name-input').value = '';
  document.getElementById('name-err').style.display = 'none';
  show('screen-landing');
}

// ─────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────
function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('prog-fill').style.width = ((current / QUESTIONS.length) * 100) + '%';

  // Build code with inputs
  let raw = q.template;
  q.blanks.forEach((b, i) => raw = raw.replace('___', `%%B${i}%%`));
  let code = escHtml(raw);
  code = colourCode(code);
  q.blanks.forEach((b, i) => {
    const saved = escHtml(userAnswers[current][i]);
    code = code.replace(`%%B${i}%%`,
      `<input class="blank-input" id="b${i}" placeholder="${b.ph}" size="${b.size}" value="${saved}" autocomplete="off" autocorrect="off" spellcheck="false">`
    );
  });

  const isLast = current === QUESTIONS.length - 1;

  document.getElementById('q-container').innerHTML = `
    <div class="q-card">
      <div class="q-topic">Q${current+1} · ${q.topic}</div>
      <div class="q-title">${q.title}</div>
      <div class="code-block">${code}</div>
    </div>
    <div class="nav-row">
      ${current > 0 ? `<button class="btn btn-ghost" onclick="goBack()">← Back</button>` : ''}
      <button class="btn btn-primary" onclick="${isLast ? 'submitQuiz()' : 'goNext()'}">
        ${isLast ? '✔ Submit Quiz' : 'Next →'}
      </button>
    </div>`;

  setTimeout(() => { const f = document.getElementById('b0'); if (f) f.focus(); }, 60);

  // Enter on last blank = Next/Submit
  q.blanks.forEach((b, i) => {
    const el = document.getElementById(`b${i}`);
    if (el) el.addEventListener('keydown', e => {
      if (e.key === 'Enter') { isLast ? submitQuiz() : goNext(); }
    });
  });
}

function saveCurrentAnswers() {
  QUESTIONS[current].blanks.forEach((b, i) => {
    const el = document.getElementById(`b${i}`);
    if (el) userAnswers[current][i] = el.value.trim();
  });
}

function goNext() {
  saveCurrentAnswers();
  current++;
  renderQuestion();
}

function goBack() {
  saveCurrentAnswers();
  current--;
  renderQuestion();
}

// ─────────────────────────────────────────
//  SUBMIT & SCORE
// ─────────────────────────────────────────
function submitQuiz() {
  saveCurrentAnswers();

  let score = 0;
  const results = QUESTIONS.map((q, qi) => {
    const given = userAnswers[qi];
    const correct = q.answers.every((ans, i) =>
      (given[i] || '').toLowerCase() === ans.toLowerCase()
    );
    if (correct) score++;
    return { q, given, correct };
  });

  // ── RESULT SCREEN ──
  const pct = Math.round((score / QUESTIONS.length) * 100);
  document.getElementById('res-name').textContent = studentName;
  document.getElementById('res-score').innerHTML = `${score}<sub>/${QUESTIONS.length}</sub>`;

  let emoji = '😔', msg = 'Keep practising — review the topics and try again!';
  if      (pct >= 90) { emoji = '🏆'; msg = 'Outstanding! You have mastered Python basics!'; }
  else if (pct >= 70) { emoji = '🎉'; msg = 'Great work! A little more practice and you will be perfect.'; }
  else if (pct >= 50) { emoji = '👍'; msg = 'Not bad! Review the questions you missed and try again.'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-msg').textContent = msg;

  document.getElementById('bk-list').innerHTML = results.map((r, i) => {
    const yourAns = r.given.join(' / ') || '—';
    const rightAns = r.q.answers.join(' / ');
    return `
    <div class="bk-item">
      <span class="bk-num">Q${i+1}</span>
      <span class="bk-icon">${r.correct ? '✅' : '❌'}</span>
      <span>
        <strong>${r.q.topic}</strong><br>
        ${r.correct
          ? `<span class="bk-ok">Correct</span>`
          : `<span class="bk-wrong">Your answer: ${yourAns}</span><br>
             <span class="bk-right">Correct: ${rightAns}</span>`
        }
      </span>
    </div>`;
  }).join('');

  show('screen-result');
}

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function colourCode(html) {
  html = html.replace(/(&quot;[^%<]*?&quot;)/g, '<span class="str">$1</span>');
  html = html.replace(/(#[^\n<]*)/g, '<span class="cmt">$1</span>');
  html = html.replace(/(?<![a-zA-Z_%])(\b\d+\.?\d*\b)/g, '<span class="num">$1</span>');
  ['for','if','else','elif','in','not','and','or','True','False','None',
   'print','append','insert','remove','def','return','import','from','pass','break','continue'
  ].forEach(k => {
    html = html.replace(new RegExp('(?<![a-zA-Z0-9_%])(' + k + ')(?![a-zA-Z0-9_%])', 'g'), '<span class="kw">$1</span>');
  });
  return html;
}
</script>
</body>
</html>
